---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  timeout: 600
  force: true
  wait: true
  waitForJobs: true

repositories:
  - name: cilium
    url: https://helm.cilium.io

  - name: coredns
    url: https://coredns.github.io/helm

releases:
  - name: prometheus-operator-crds
    namespace: observability
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    # changelog: prometheus-operator GH releases (chart-major = operator CRD bump; PR body thin)
    version: 30.0.1

  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: 1.19.6
    values:
      - ../apps/kube-system/cilium/values.sops.yaml
    needs:
      - observability/prometheus-operator-crds

  - name: coredns
    namespace: kube-system
    chart: coredns/coredns
    version: 1.46.2
    values:
      - ../apps/kube-system/coredns/values.yaml
    needs:
      - kube-system/cilium

  - name: argo-cd
    namespace: argo-system
    chart: oci://ghcr.io/argoproj/argo-helm/argo-cd
    # changelog: helm pull oci://ghcr.io/argoproj/argo-helm/argo-cd --version X --untar, then diff the trees (PR body "Full Changelog" link points at the wrong tag lineage)
    version: 10.1.4
    secrets:
      - ../apps/argo-system/argo-cd/values.sops.yaml
    needs:
      - kube-system/coredns
