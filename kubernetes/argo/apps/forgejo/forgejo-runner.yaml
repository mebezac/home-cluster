apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo-runner
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # after forgejo (wave 0)
spec:
  project: kubernetes
  sources:
    # source 1: repo path — renders the ksops runner-registration Secret
    # (kustomization.yaml) AND provides values.yaml to the chart source below.
    - repoURL: https://github.com/mebezac/home-cluster.git
      path: kubernetes/apps/forgejo/forgejo-runner
      targetRevision: main
      ref: forgejo-runner-repo
    # source 2: eleboucher's forgejo-runner chart (runner + k8s plugin sidecar,
    # ServiceAccount/Role/RoleBinding, runner.yaml + podspec ConfigMap).
    - repoURL: git.erwanleboucher.dev/eleboucher/charts
      chart: forgejo-runner
      targetRevision: 12.10.9
      helm:
        releaseName: forgejo-runner
        valueFiles:
          - $forgejo-runner-repo/kubernetes/apps/forgejo/forgejo-runner/values.yaml
  destination:
    name: in-cluster
    namespace: forgejo
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
