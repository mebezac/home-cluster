apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reckage
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: https://github.com/mebezac/home-cluster.git
      path: kubernetes/apps/reckage/reckage
      targetRevision: main
      ref: reckage-repo
    - repoURL: ghcr.io/bjw-s-labs/helm
      chart: app-template
      targetRevision: 5.0.1
      helm:
        releaseName: reckage
        valueFiles:
          - $reckage-repo/kubernetes/apps/reckage/reckage/values.yaml
  destination:
    name: in-cluster
    namespace: reckage
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
