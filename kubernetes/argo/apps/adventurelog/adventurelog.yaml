apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adventurelog
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: https://github.com/mebezac/home-cluster.git
      path: kubernetes/apps/adventurelog/adventurelog
      targetRevision: main
      ref: adventurelog-repo
    - repoURL: ghcr.io/bjw-s-labs/helm
      chart: app-template
      targetRevision: 4.6.2
      helm:
        releaseName: adventurelog
        valueFiles:
          - $adventurelog-repo/kubernetes/apps/adventurelog/adventurelog/values.yaml
  destination:
    name: in-cluster
    namespace: adventurelog
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
