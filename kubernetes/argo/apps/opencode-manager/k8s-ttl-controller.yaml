---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-ttl-controller
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kubernetes
  sources:
    - repoURL: https://github.com/mebezac/home-cluster.git
      path: kubernetes/apps/opencode-manager/k8s-ttl-controller
      targetRevision: main
      ref: k8s-ttl-controller-repo
    - repoURL: ghcr.io/bjw-s-labs/helm
      chart: app-template
      targetRevision: 5.0.1
      helm:
        releaseName: k8s-ttl-controller
        valueFiles:
          - $k8s-ttl-controller-repo/kubernetes/apps/opencode-manager/k8s-ttl-controller/values.yaml
  destination:
    name: in-cluster
    namespace: opencode-manager
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
