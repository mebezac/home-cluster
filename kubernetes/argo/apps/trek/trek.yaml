apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trek
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: https://github.com/mebezac/home-cluster.git
      path: kubernetes/apps/trek/trek
      targetRevision: main
      ref: trek-repo
    - repoURL: ghcr.io/bjw-s-labs/helm
      chart: app-template
      targetRevision: 5.0.1
      helm:
        releaseName: trek
        valueFiles:
          - $trek-repo/kubernetes/apps/trek/trek/values.yaml
  destination:
    name: in-cluster
    namespace: trek
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
