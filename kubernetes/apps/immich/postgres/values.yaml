---
controllers:
  main:
    replicas: 1
    containers:
      db18:
        image:
          repository: ghcr.io/immich-app/postgres
          tag: 18-vectorchord0.5.3-pgvector0.8.1@sha256:f3028f313a766e48fed94f077fb19a8718c5cc673cb00d51a038fdce480d670a
        env:
          POSTGRES_INITDB_ARGS: --data-checksums
          PGDATA: /var/lib/postgresql18/data
          PGPORT: 5433
        envFrom:
          - secretRef:
              name: immich-db-secret
        resources:
          requests:
            cpu: 1000m
            memory: 250Mi
          limits:
            memory: 2Gi

      metrics:
        image:
          repository: quay.io/prometheuscommunity/postgres-exporter
          # changelog: GH releases prometheus-community/postgres_exporter (not in PR body)
          tag: v0.20.1@sha256:ac5ec343104fae0e2d84a27bb8d69b38430a11910c5382cad85d478d2bab713e
        env:
          DATA_SOURCE_URI: localhost:5433/postgres?sslmode=disable
        envFrom:
          - secretRef:
              name: immich-db-secret
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
service:
  db18:
    ports:
      postgres:
        port: 5433
  metrics:
    ports:
      metrics:
        port: 9187

serviceMonitor:
  main:
    enabled: true
    serviceName: immich-db-metrics
    endpoints:
      - port: metrics

persistence:
  data-18:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    suffix: data-18
    size: 5Gi
    advancedMounts:
      main:
        db18:
          - path: /var/lib/postgresql18/data
            subPath: postgresql-data
