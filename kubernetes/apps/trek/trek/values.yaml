# TREK — self-hosted collaborative travel planner (SQLite, self-contained)
# Upstream image (mauriceboe/trek); OIDC support is now merged upstream, so we
# no longer need the mebezac fork build.
# Image entrypoint starts as root and drops to the `node` user (UID 1000) via
# `gosu`, so we intentionally do NOT force a non-root securityContext here —
# doing so would break the entrypoint's privilege-drop and chown of the volumes.
controllers:
  trek:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: mauriceboe/trek
          # changelog: GH releases github.com/mauriceboe/trek/releases (Docker Hub image; not in PR body)
          tag: 3.4.1@sha256:ce7fab639b89a6f62d484d1175a7d489a536a8c77291f56c03fec20608d4a3eb
        env:
          TZ: America/New_York
          NODE_ENV: production
          PORT: 3000
          APP_URL: https://trek.laboratory.casa
          TRUST_PROXY: "1"
          ALLOW_INTERNAL_NETWORK: "true"
          # OIDC SSO via Authelia. Issuer's standard discovery path is used
          # (<issuer>/.well-known/openid-configuration) so OIDC_DISCOVERY_URL is unset.
          # OIDC_CLIENT_ID / OIDC_CLIENT_SECRET come from the trek-secret.
          OIDC_ISSUER: https://login.laboratory.casa
          OIDC_DISPLAY_NAME: Authelia
          # groups scope is requested so the admin-claim mapping below resolves
          OIDC_SCOPE: openid email profile groups
          OIDC_ADMIN_CLAIM: groups
          OIDC_ADMIN_VALUE: apps_admin
        envFrom:
          - secretRef:
              name: trek-secret
        resources:
          requests:
            cpu: 25m
            memory: 192M
          limits:
            memory: 768M
service:
  app:
    controller: trek
    ports:
      http:
        port: 3000
ingress:
  app:
    className: internal
    hosts:
      - host: trek.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http
persistence:
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    suffix: data
    size: 1Gi
    globalMounts:
      - path: /app/data
        subPath: data
      - path: /app/uploads
        subPath: uploads
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
