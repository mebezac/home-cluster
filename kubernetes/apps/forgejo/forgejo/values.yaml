defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 3000
    runAsGroup: 3000
    fsGroup: 3000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

controllers:
  forgejo:
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
          pullPolicy: IfNotPresent
        envFrom: &envFrom
          - secretRef:
              name: forgejo-secret
    containers:
      app:
        image:
          repository: codeberg.org/forgejo/forgejo
          # changelog: codeberg raw branch forgejo/release-notes-published/<version>.md + forgejo.org blog for breaking changes (PR body is a stub)
          tag: 16.0.1-rootless@sha256:71863f6b6c5837a27b3a2d133c3161c78a432aa878d57798d74b1d917ff842be
        env:
          TZ: America/New_York
          USER: git
          # --- server / reverse proxy (git.laboratory.casa, TLS terminated at ingress) ---
          FORGEJO__server__DOMAIN: git.laboratory.casa
          FORGEJO__server__ROOT_URL: https://git.laboratory.casa/
          FORGEJO__server__HTTP_PORT: "3000"
          FORGEJO__server__SSH_DOMAIN: git.laboratory.casa
          FORGEJO__server__START_SSH_SERVER: "true"
          FORGEJO__server__SSH_PORT: "22" # advertised in clone URLs (LB listens on 22)
          FORGEJO__server__SSH_LISTEN_PORT: "2222" # built-in ssh server inside the container
          FORGEJO__server__LFS_START_SERVER: "true"
          FORGEJO__security__REVERSE_PROXY_LIMIT: "1"
          FORGEJO__security__REVERSE_PROXY_TRUSTED_PROXIES: "*"
          FORGEJO__security__INSTALL_LOCK: "true"
          # --- database (central CNPG) ---
          FORGEJO__database__DB_TYPE: postgres
          FORGEJO__database__HOST: postgres-17-cluster-rw.database.svc.cluster.local:5432
          FORGEJO__database__NAME: forgejo
          FORGEJO__database__USER: forgejo
          FORGEJO__database__SSL_MODE: disable
          # --- private instance: SSO-only registration, sign-in required to view ---
          FORGEJO__service__DISABLE_REGISTRATION: "false"
          FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION: "true"
          # false = allow anonymous view of PUBLIC content (repos, users, and
          # public packages/registry pulls). Private content still requires auth.
          FORGEJO__service__REQUIRE_SIGNIN_VIEW: "false"
          FORGEJO__service__ENABLE_NOTIFY_MAIL: "true"
          FORGEJO__service__DEFAULT_KEEP_EMAIL_PRIVATE: "true"
          FORGEJO__openid__ENABLE_OPENID_SIGNIN: "false"
          FORGEJO__openid__ENABLE_OPENID_SIGNUP: "false"
          # --- OIDC SSO via Authelia (source itself added post-boot via `forgejo admin auth add-oauth`) ---
          FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: "true"
          FORGEJO__oauth2_client__ACCOUNT_LINKING: auto
          FORGEJO__oauth2_client__USERNAME: nickname
          FORGEJO__oauth2_client__UPDATE_AVATAR: "true"
          FORGEJO__oauth2_client__REGISTER_EMAIL_CONFIRM: "false"
          # --- repository defaults ---
          FORGEJO__repository__DEFAULT_BRANCH: main
          # --- mailer (Fastmail relay) ---
          FORGEJO__mailer__ENABLED: "true"
          FORGEJO__mailer__PROTOCOL: smtp+starttls
          FORGEJO__mailer__SMTP_ADDR: smtp.fastmail.com
          FORGEJO__mailer__SMTP_PORT: "587"
          FORGEJO__mailer__FROM: Forgejo <git@laboratory.casa>
          # --- prometheus metrics (scraped on the main http port at /metrics) ---
          FORGEJO__metrics__ENABLED: "true"
          FORGEJO__metrics__ENABLE_ISSUE_BY_LABEL: "true"
          FORGEJO__metrics__ENABLE_ISSUE_BY_REPOSITORY: "true"
          # --- central valkey for cache / session / queue ---
          # (connection strings carry the valkey password -> in forgejo-secret)
          FORGEJO__cache__ENABLED: "true"
          FORGEJO__cache__ADAPTER: redis
          FORGEJO__session__PROVIDER: redis
          FORGEJO__queue__TYPE: redis
          # --- Forgejo Actions (server side; runner is a separate workload added later) ---
          FORGEJO__actions__ENABLED: "true"
          # keep 90 days of job logs; [cron.cleanup_actions] (on by default, nightly) deletes
          # expired runs' logs + DB rows together. ARTIFACT_RETENTION_DAYS already defaults to 90.
          FORGEJO__actions__LOG_RETENTION_DAYS: "90"
          # --- object storage: packages + repo-archive + actions_artifacts + actions_log in one
          #     Garage bucket, each under its own dir. Common S3 conn in [storage]; these opt into minio. ---
          FORGEJO__storage__MINIO_ENDPOINT: garage-s3.garage.svc.cluster.local:3900
          FORGEJO__storage__MINIO_BUCKET: forgejo
          FORGEJO__storage__MINIO_LOCATION: us-east-1
          FORGEJO__storage__MINIO_USE_SSL: "false"
          FORGEJO__storage__MINIO_BUCKET_LOOKUP: path
          FORGEJO__storage__MINIO_CHECKSUM_ALGORITHM: md5
          FORGEJO__storage_0X2E_packages__STORAGE_TYPE: minio
          FORGEJO__storage_0X2E_packages__MINIO_BASE_PATH: packages/
          FORGEJO__storage_0X2E_repo-archive__STORAGE_TYPE: minio
          FORGEJO__storage_0X2E_repo-archive__MINIO_BASE_PATH: repo-archive/
          FORGEJO__storage_0X2E_actions_artifacts__STORAGE_TYPE: minio
          FORGEJO__storage_0X2E_actions_artifacts__MINIO_BASE_PATH: actions_artifacts/
          FORGEJO__storage_0X2E_actions_log__STORAGE_TYPE: minio
          FORGEJO__storage_0X2E_actions_log__MINIO_BASE_PATH: actions_log/
        envFrom: *envFrom
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz
                port: 3000
              periodSeconds: 5
              failureThreshold: 40 # allow up to ~3.5m for first-run migrations
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz
                port: 3000
              periodSeconds: 30
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz
                port: 3000
              periodSeconds: 15
              failureThreshold: 3
        resources:
          requests: { cpu: 50m, memory: 384Mi }
          limits: { memory: 1536Mi }

service:
  app:
    controller: forgejo
    ports:
      http:
        port: 3000
  ssh:
    controller: forgejo
    type: LoadBalancer
    annotations:
      # Shares the internal ingress IP with ingress-nginx-internal (network ns).
      # Ports don't collide: ingress holds 80/443, this holds 22. Keeps git SSH and
      # HTTPS on one DNS name (git.laboratory.casa) so clients need no ssh_config
      # HostName override — see the `fj` CLI breakage that motivated this.
      lbipam.cilium.io/ips: 10.25.30.117
      lbipam.cilium.io/sharing-key: internal-ingress
      lbipam.cilium.io/sharing-cross-namespace: network
    externalTrafficPolicy: Cluster
    ports:
      ssh:
        port: 22
        targetPort: 2222

ingress:
  app:
    className: internal
    hosts:
      - host: git.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http

serviceMonitor:
  app:
    serviceName: forgejo
    endpoints:
      - port: http
        path: /metrics

persistence:
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 10Gi
    globalMounts:
      - path: /var/lib/gitea
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
