# Forgejo Actions runner with the Kubernetes backend plugin.
# eleboucher/runner-k8s-plugin: the (forked) runner schedules each CI job as its
# own pod in this namespace instead of using docker-in-docker. The plugin runs as
# a native sidecar alongside the runner; the chart wires up the ServiceAccount +
# Role/RoleBinding, the shared socket, and the runner.yaml/podspec ConfigMap.

forgejo:
  # in-cluster Forgejo HTTP service (svc/forgejo-app in this namespace)
  url: http://forgejo-app.forgejo.svc.cluster.local:3000
  # ksops-generated secret (forgejo-runner-secret.sops.yaml), keys `token` + `uuid`.
  # This is Forgejo OFFLINE shared-secret registration, NOT a UI "Create new Runner"
  # token. To (re)provision:
  #   SECRET=$(openssl rand -hex 20)                       # 40-hex shared secret -> `token`
  #   UUID from: forgejo-runner create-runner-file --secret $SECRET  (reads .runner)
  #   register on Forgejo (idempotent), secret via stdin:
  #     kubectl -n forgejo exec -i <forgejo-pod> -c app -- \
  #       forgejo forgejo-cli actions register --secret-stdin --scope "" \
  #       --name forgejo-runner-k8s --labels "ubuntu-latest,default"
  # The daemon then auths as: --uuid <uuid> --token-url file://<token>.
  existingSecret: forgejo-runner-secret

# Runner image (the eleboucher fork that speaks the k8s plugin protocol).
image:
  repository: git.erwanleboucher.dev/eleboucher/runner
  tag: "12.13.0"
  digest: "sha256:b71959782cea9cbc86eaeb47e5ba32bf8179fbd117dd849e001c9a13807b1a07"

plugin:
  image:
    repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin
    tag: "12.10.9"
    digest: "sha256:7fb94371ccc6ef3ff7e2110b2c04050a68bb8031d3224ed8aee2cd5e1d31c673"

# Full runner.yaml. plugins.k8s.address MUST match the chart's plugin.socketPath,
# and options.namespace is the namespace job pods are created in (this release's ns).
runnerConfig: |
  cache:
    enabled: true
    dir: /data/cache
    port: 8088
    proxy_port: 8089
  container:
    docker_host: "-"
    workdir_parent: shared/workdir
  host:
    workdir_parent: /data/act
  log:
    level: info
  plugins:
    k8s:
      address: "unix:///plugin/forgejo-runner-k8s.sock"
      options:
        namespace: forgejo
        poll_timeout: 10m
        labels: "app.kubernetes.io/name=forgejo-runner-instance"
        resources: |
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
  runner:
    capacity: 3
    labels:
      - ubuntu-latest:k8s:/config/podspec-default.yaml
      - default:k8s:/config/podspec-default.yaml
      - mise:k8s:/config/podspec-mise.yaml            # runs-on: mise -> any toolchain via mise install
    timeout: 3h
    shutdown_timeout: 3m

# PodSpec templates referenced by the runner labels above. k8s-only (no privileged
# docker-in-docker). Job pods run bjw-s's runner image, pinned by digest.
podSpecs:
  podspec-default.yaml: |
    containers:
      - name: main
        image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:fce99eeccdfec1780643510c72d8fcbb8ef5fa82a54066ed4aaab3d03a3eb830
        imagePullPolicy: IfNotPresent
        env:
          - name: DEBIAN_FRONTEND
            value: noninteractive
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 16Gi
    restartPolicy: Never
  # `runs-on: mise` — generic toolchain runner. The jdx/mise image already sets
  # MISE_DATA_DIR=/mise and puts /mise/shims on PATH, so a workflow just runs
  # `mise install` (reads the repo's mise.toml/.tool-versions) and the tools are
  # then on PATH directly. MISE_YES=1 auto-trusts the repo config in CI.
  # NOTE: binary tools (node/go/deno/python/terraform) install fast; compile-from-source
  # langs (erlang/elixir, ruby) build each run (minutes) since job pods are ephemeral.
  podspec-mise.yaml: |
    containers:
      - name: main
        image: ghcr.io/jdx/mise:2026.7.5@sha256:3511d21606638b7285e545f83756e993bfaa67cbe7d9b4eeeec8ad87230a0eff
        imagePullPolicy: IfNotPresent
        env:
          - name: MISE_YES
            value: "1"
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 16Gi
    restartPolicy: Never
