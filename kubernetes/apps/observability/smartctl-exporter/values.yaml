fullnameOverride: smartctl-exporter
# Skip the T2 Mac nodes — their disks (USB-bridged /dev/sda, T2-mediated nvme)
# don't pass SMART and only produce errors. A separate smartctl-exporter-talmac
# release monitors just their nvme. See kubernetes/apps/observability/smartctl-exporter-talmac.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values: ["talmac-01", "talmac-02", "talmac-03"]
serviceMonitor:
  enabled: true
prometheusRules:
  enabled: true
  rules:
    smartCTLDDeviceTemperature:
      enabled: true
      alert: SmartCTLDDeviceTemperature
      expr: smartctl_device_temperature{temperature_type="current"} > 70
      for: 1m
      annotations:
        summary: Device has temperature higher than 70°C
        description: Device {{ $labels.device }} on instance {{ $labels.instance }} has temperature higher than 70°C
      labels:
        severity: warning
