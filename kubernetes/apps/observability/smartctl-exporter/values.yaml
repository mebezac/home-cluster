fullnameOverride: smartctl-exporter
# Skip the T2 Mac nodes (talmac-*). Their disks cannot be SMART-monitored at all:
# the USB-bridged SSDs (/dev/sd*) don't pass SMART, and the T2-mediated internal
# NVMe rejects standard SMART log pages (Invalid Log Page 0x109) — yielding zero
# usable metrics and constant errors. So we don't run the exporter there.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values: ["talmac-01", "talmac-02", "talmac-03"]
serviceMonitor:
  enabled: true
prometheusRules:
  enabled: true
  rules:
    smartCTLDDeviceTemperature:
      enabled: true
      alert: SmartCTLDDeviceTemperature
      expr: smartctl_device_temperature{temperature_type="current"} > 70
      for: 1m
      annotations:
        summary: Device has temperature higher than 70°C
        description: Device {{ $labels.device }} on instance {{ $labels.instance }} has temperature higher than 70°C
      labels:
        severity: warning
