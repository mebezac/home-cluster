fullnameOverride: smartctl-exporter-talmac
# T2 Mac nodes only. Their USB-bridged /dev/sda cannot be read via smartctl
# (USB-SATA bridge doesn't pass SMART), so restrict scanning to the internal
# nvme device — this eliminates the "Smartctl open device: /dev/sda failed"
# error spam while keeping NVMe temperature/health metrics.
# device-include matches the SHORT device name (e.g. "nvme0"), not the /dev path.
# Pin to the internal T2 NVMe only; the USB-bridged disks enumerate unstably as
# sd[b-e] and can't be SMART-read.
extraArgs:
  smartctl.device-include: "^nvme[0-9]+$"
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: ["talmac-01", "talmac-02", "talmac-03"]
serviceMonitor:
  enabled: true
# Alerting rules are metric-based (match all smartctl_device_temperature series
# cluster-wide), so the main release's PrometheusRule already covers these nodes.
prometheusRules:
  enabled: false
