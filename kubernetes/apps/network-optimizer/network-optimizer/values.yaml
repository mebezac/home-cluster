---
defaultPodOptions:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  securityContext:
    seccompProfile: { type: RuntimeDefault }

controllers:
  network-optimizer:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/ozark-connect/network-optimizer
          tag: 2.3.0@sha256:f92cd15d9f64a9e83a98eda5af9d45693333112c6b4c6c69d19422ab6075d3bc
        env:
          TZ: America/New_York
          BIND_LOCALHOST_ONLY: "false"
          APP_PASSWORD: ""
          DEMO_MODE_MAPPINGS: ""
          HOST_NAME: network-optimizer.laboratory.casa
          REVERSE_PROXIED_HOST_NAME: network-optimizer.laboratory.casa
          OPENSPEEDTEST_PORT: "3005"
          OPENSPEEDTEST_HOST: network-optimizer.laboratory.casa
          OPENSPEEDTEST_HTTPS: "false"
          OPENSPEEDTEST_HTTPS_PORT: "443"
          Iperf3Server__Enabled: "false"
          Logging__LogLevel__Default: Information
          Logging__LogLevel__NetworkOptimizer: Information
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 1Gi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              # tcpSocket, not httpGet: the app 302-redirects all HTTP to HTTPS
              # (Kestrel UseHttpsRedirection), which floods events with harmless
              # "Probe terminated redirects" warnings. A TCP check gives the same
              # real signal (Kestrel accepting connections) without the noise.
              tcpSocket:
                port: 8042
              initialDelaySeconds: 40
              periodSeconds: 30
              timeoutSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              # tcpSocket, not httpGet: the app 302-redirects all HTTP to HTTPS
              # (Kestrel UseHttpsRedirection), which floods events with harmless
              # "Probe terminated redirects" warnings. A TCP check gives the same
              # real signal (Kestrel accepting connections) without the noise.
              tcpSocket:
                port: 8042
              initialDelaySeconds: 40
              periodSeconds: 30
              timeoutSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              # tcpSocket, not httpGet: the app 302-redirects all HTTP to HTTPS
              # (Kestrel UseHttpsRedirection), which floods events with harmless
              # "Probe terminated redirects" warnings. A TCP check gives the same
              # real signal (Kestrel accepting connections) without the noise.
              tcpSocket:
                port: 8042
              initialDelaySeconds: 40
              periodSeconds: 10
              failureThreshold: 30

  speedtest:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/ozark-connect/speedtest
          tag: 2.3.0@sha256:756f1c2fa63fa2d059b1b2fd4cfb8ed48f0e6bb84efa32dd2e49d43e491f14a3
        env:
          TZ: America/New_York
          HOST_NAME: network-optimizer.laboratory.casa
          OPENSPEEDTEST_PORT: "3005"
          OPENSPEEDTEST_HOST: network-optimizer.laboratory.casa
          OPENSPEEDTEST_HTTPS: "false"
          OPENSPEEDTEST_HTTPS_PORT: "443"
          REVERSE_PROXIED_HOST_NAME: network-optimizer.laboratory.casa
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  network-optimizer:
    controller: network-optimizer
    ports:
      http:
        port: 8042
  speedtest:
    controller: speedtest
    ports:
      http:
        port: 3000

ingress:
  network-optimizer:
    enabled: true
    className: internal
    hosts:
      - host: network-optimizer.laboratory.casa
        paths:
          - path: /
            service:
              identifier: network-optimizer
              port: http
  speedtest:
    enabled: true
    className: internal
    hosts:
      - host: speedtest.laboratory.casa
        paths:
          - path: /
            service:
              identifier: speedtest
              port: http

persistence:
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 5Gi
    advancedMounts:
      network-optimizer:
        app:
          - path: /app/data
            subPath: data
  ssh-keys:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 100Mi
    advancedMounts:
      network-optimizer:
        app:
          - path: /app/ssh-keys
            subPath: ssh-keys
  logs:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 2Gi
    advancedMounts:
      network-optimizer:
        app:
          - path: /app/logs
            subPath: logs
