defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 3000
    runAsGroup: 3000
    fsGroup: 3000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

controllers:
  tuwunel:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/matrix-construct/tuwunel
          tag: v1.8.0@sha256:0b00dc4fe125736c3b96070ad397e43498750ecb59ec09e573327155eec6c31a
        env:
          TZ: America/New_York
          # --- core ---
          TUWUNEL_SERVER_NAME: matrix.laboratory.casa
          TUWUNEL_ADDRESS: 0.0.0.0
          TUWUNEL_PORT: "8008"
          TUWUNEL_DATABASE_PATH: /data/db
          TUWUNEL_MAX_REQUEST_SIZE: "104857600"   # 100 MiB (match ingress proxy-body-size)
          TUWUNEL_LOG: info
          # Real client IP for rate-limiting/logging. This host is split-horizon:
          # on the LAN it resolves straight to the nginx LB (Cloudflare is NOT in the
          # path), so CF-Connecting-IP doesn't exist. nginx always sets X-Forwarded-For,
          # whose rightmost entry is the real LAN client (or the cloudflared hop on the
          # rarer internet path) — so this never fails to resolve. Matches Tuwunel's
          # documented nginx guidance.
          TUWUNEL_IP_SOURCE: rightmost_x_forwarded_for
          # OIDC dynamic client registration is locked down via
          # TUWUNEL_OIDC_REGISTRATION_ACCESS_TOKEN in the secret.
          # --- serve client well-known so Element autodiscovery + login work ---
          TUWUNEL_WELL_KNOWN__CLIENT: https://matrix.laboratory.casa
          # --- private trial: no federation with the public Matrix network ---
          TUWUNEL_ALLOW_FEDERATION: "false"
          # --- registration: token-gated (no open reg); first user becomes admin ---
          TUWUNEL_ALLOW_REGISTRATION: "true"        # gated by TUWUNEL_REGISTRATION_TOKEN (secret)
          TUWUNEL_GRANT_ADMIN_TO_FIRST_USER: "true"
          TUWUNEL_ALLOW_GUEST_REGISTRATION: "false"
          # default appends "💕" to new users' display names — disable it
          TUWUNEL_NEW_USER_DISPLAYNAME_SUFFIX: ""
          # auto-join new users to these rooms (must exist + be public first)
          TUWUNEL_AUTO_JOIN_ROOMS: '["#announcements:matrix.laboratory.casa", "#general:matrix.laboratory.casa"]'
          # --- Authelia OIDC (external identity provider, index 0) ---
          # client_secret lives in the secret; client_id is embedded in the callback URL anyway
          TUWUNEL_IDENTITY_PROVIDER__0__NAME: Authelia
          TUWUNEL_IDENTITY_PROVIDER__0__BRAND: authelia
          TUWUNEL_IDENTITY_PROVIDER__0__ISSUER_URL: https://login.laboratory.casa
          TUWUNEL_IDENTITY_PROVIDER__0__CLIENT_ID: 5nFMycu4rhrkCR89fxcpN3AqHBtzd5q2ucBtBVTKbtKU5XBRMUkfDgx9rxuWJkzWUZ4BWTxT
          TUWUNEL_IDENTITY_PROVIDER__0__CALLBACK_URL: https://matrix.laboratory.casa/_matrix/client/unstable/login/sso/callback/5nFMycu4rhrkCR89fxcpN3AqHBtzd5q2ucBtBVTKbtKU5XBRMUkfDgx9rxuWJkzWUZ4BWTxT
          TUWUNEL_IDENTITY_PROVIDER__0__TRUSTED: "true"        # link accounts by claim (self-hosted IdP)
          TUWUNEL_IDENTITY_PROVIDER__0__REGISTRATION: "true"   # let Authelia users create their matrix account on first SSO
          TUWUNEL_IDENTITY_PROVIDER__0__USERID_CLAIMS: '["preferred_username"]'
          # --- media: offload to in-cluster Garage S3 (RocksDB stays on the PVC) ---
          TUWUNEL_STORAGE_PROVIDER__GARAGE__S3__ENDPOINT: https://s3.laboratory.casa
          TUWUNEL_STORAGE_PROVIDER__GARAGE__S3__BUCKET: matrix
          TUWUNEL_STORAGE_PROVIDER__GARAGE__S3__REGION: us-east-1
          TUWUNEL_STORAGE_PROVIDER__GARAGE__S3__USE_VHOST_REQUEST: "false"  # Garage = path-style
          TUWUNEL_STORAGE_PROVIDER__GARAGE__S3__USE_HTTPS: "true"
          TUWUNEL_MEDIA_STORAGE_PROVIDERS: '["media", "garage"]'  # local kept as read fallback
          TUWUNEL_STORE_MEDIA_ON_PROVIDERS: '["garage"]'           # new uploads go to Garage
        envFrom:
          - secretRef:
              name: tuwunel-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /_matrix/client/versions, port: 8008 }
              initialDelaySeconds: 20
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /_matrix/client/versions, port: 8008 }
              initialDelaySeconds: 10
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /_matrix/client/versions, port: 8008 }
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 60
        resources:
          requests: { cpu: 50m, memory: 256Mi }
          limits: { memory: 2Gi }

service:
  app:
    controller: tuwunel
    ports:
      http:
        port: 8008

ingress:
  app:
    className: external
    annotations:
      external-dns.alpha.kubernetes.io/target: external.laboratory.casa
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    hosts:
      - host: matrix.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http

persistence:
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 8Gi
    globalMounts:
      - path: /data
