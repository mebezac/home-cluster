defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 3000
    runAsGroup: 3000
    fsGroup: 3000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

controllers:
  chatto:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/chattocorp/chatto
          tag: 0.4.2@sha256:bff0c283ae514ee6ab3fac8f46494aa1bf77a276b3e493d3fbd76612369d54d9
        env:
          TZ: America/New_York
          PUID: "3000"
          PGID: "3000"
          # --- core web server ---
          CHATTO_WEBSERVER_URL: https://chat.laboratory.casa
          CHATTO_WEBSERVER_PORT: "4000"
          CHATTO_WEBSERVER_ALLOWED_ORIGINS: https://chat.laboratory.casa
          CHATTO_LOG_FORMAT: json
          CHATTO_LOG_LEVEL: info
          # --- registration: closed, OAuth/invite only ---
          CHATTO_AUTH_DIRECT_REGISTRATION: "false"
          CHATTO_OWNERS_EMAILS: claude@zac.pizza
          # --- datastore: embedded NATS/JetStream on the /data PVC ---
          CHATTO_NATS_EMBEDDED_ENABLED: "true"
          CHATTO_NATS_EMBEDDED_DATA_DIR: /data
          # --- assets: offload to in-cluster Garage S3 (message data stays in NATS) ---
          CHATTO_CORE_ASSETS_STORAGE_BACKEND: s3
          CHATTO_CORE_ASSETS_S3_ENDPOINT: http://garage-s3.garage.svc.cluster.local:3900
          CHATTO_CORE_ASSETS_S3_BUCKET: chatto
          CHATTO_CORE_ASSETS_S3_REGION: us-east-1
          CHATTO_CORE_ASSETS_S3_USE_SSL: "false"
          CHATTO_CORE_ASSETS_S3_PATH_STYLE: "true"
          # --- video transcoding (ffmpeg baked into image) ---
          CHATTO_VIDEO_ENABLED: "true"
          CHATTO_VIDEO_TEMP_DIR: /tmp
          # --- metrics (scraped by victoria-metrics-stack) ---
          CHATTO_METRICS_ENABLED: "true"
          CHATTO_METRICS_BIND_ADDRESS: 0.0.0.0
          CHATTO_METRICS_PORT: "9090"
          CHATTO_METRICS_PATH: /metrics
          # --- web push (VAPID keys in secret) ---
          CHATTO_PUSH_ENABLED: "true"
          CHATTO_PUSH_VAPID_SUBJECT: mailto:admin@laboratory.casa
          # --- SMTP (Fastmail relay, creds in secret) ---
          CHATTO_SMTP_ENABLED: "true"
          CHATTO_SMTP_HOST: smtp.fastmail.com
          CHATTO_SMTP_PORT: "587"
          CHATTO_SMTP_TLS: mandatory
          CHATTO_SMTP_FROM: admin@laboratory.casa
          # --- external login providers (client_id/secret live in the secret) ---
          CHATTO_AUTH_PROVIDERS_0_ID: github
          CHATTO_AUTH_PROVIDERS_0_TYPE: github
          CHATTO_AUTH_PROVIDERS_0_LABEL: GitHub
          CHATTO_AUTH_PROVIDERS_0_REQUEST_EMAIL: "true"
          CHATTO_AUTH_PROVIDERS_0_AUTO_PROVISION: "true"
          CHATTO_AUTH_PROVIDERS_1_ID: google
          CHATTO_AUTH_PROVIDERS_1_TYPE: google
          CHATTO_AUTH_PROVIDERS_1_LABEL: Google
          CHATTO_AUTH_PROVIDERS_1_REQUEST_EMAIL: "true"
          CHATTO_AUTH_PROVIDERS_1_AUTO_PROVISION: "true"
          CHATTO_AUTH_PROVIDERS_2_ID: discord
          CHATTO_AUTH_PROVIDERS_2_TYPE: discord
          CHATTO_AUTH_PROVIDERS_2_LABEL: Discord
          CHATTO_AUTH_PROVIDERS_2_REQUEST_EMAIL: "true"
          CHATTO_AUTH_PROVIDERS_2_AUTO_PROVISION: "true"
          CHATTO_AUTH_PROVIDERS_3_ID: authelia
          CHATTO_AUTH_PROVIDERS_3_TYPE: oidc
          CHATTO_AUTH_PROVIDERS_3_LABEL: Authelia
          CHATTO_AUTH_PROVIDERS_3_ISSUER_URL: https://login.laboratory.casa
          CHATTO_AUTH_PROVIDERS_3_SCOPES: openid,profile,email,groups
          CHATTO_AUTH_PROVIDERS_3_REQUEST_EMAIL: "true"
          CHATTO_AUTH_PROVIDERS_3_AUTO_PROVISION: "true"
        envFrom:
          - secretRef:
              name: chatto-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /healthz, port: 4000 }
              initialDelaySeconds: 20
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /readyz, port: 4000 }
              initialDelaySeconds: 10
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /readyz, port: 4000 }
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 60
        resources:
          requests: { cpu: 50m, memory: 256Mi }
          limits: { memory: 2Gi }

service:
  app:
    controller: chatto
    ports:
      http:
        port: 4000
  metrics:
    controller: chatto
    ports:
      metrics:
        port: 9090

ingress:
  app:
    className: external
    annotations:
      external-dns.alpha.kubernetes.io/target: external.laboratory.casa
    hosts:
      - host: chat.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http

serviceMonitor:
  app:
    enabled: true
    serviceName: chatto-metrics
    labels:
      release: victoria-metrics-stack
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 30s

persistence:
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 5Gi
    globalMounts:
      - path: /data
  config:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 256Mi
    globalMounts:
      - path: /config
