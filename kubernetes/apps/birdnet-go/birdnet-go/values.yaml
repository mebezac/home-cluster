defaultPodOptions:
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

controllers:
  birdnet-go:
    containers:
      app:
        image:
          repository: ghcr.io/tphakala/birdnet-go
          tag: nightly@sha256:60573d17f59c132ac42d9d264508e80cdfbf08125f235aaaf6791a9ce511af68
        env:
          TZ: America/New_York
          BIRDNET_UID: "1000"
          BIRDNET_GID: "1000"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi

service:
  app:
    controller: birdnet-go
    ports:
      http:
        port: 8080

ingress:
  app:
    className: internal
    hosts:
      - host: bird.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    suffix: config
    size: 1Gi
    globalMounts:
      - path: /config
  data:
    # db, cache, logs, models — kept on Longhorn (SQLite needs durability + safe locking)
    existingClaim: birdnet-go-data-v2
    globalMounts:
      - path: /data
  clips:
    # audio recordings — bulk, non-critical data on TrueNAS NFS (no replication needed)
    existingClaim: birdnet-go-clips
    globalMounts:
      - path: /data/clips
  hls:
    type: emptyDir
    medium: Memory
    sizeLimit: 64Mi
    globalMounts:
      - path: /config/hls
