defaultPodOptions:
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

controllers:
  birdnet-go:
    containers:
      app:
        image:
          repository: ghcr.io/tphakala/birdnet-go
          tag: nightly@sha256:2dda8f7199afe3a95e7a44dff0934307040093461200aa6d0be5fe7ffb6bfc05
        env:
          TZ: America/New_York
          BIRDNET_UID: "1000"
          BIRDNET_GID: "1000"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi

service:
  app:
    controller: birdnet-go
    ports:
      http:
        port: 8080

ingress:
  app:
    className: internal
    hosts:
      - host: bird.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    suffix: config
    size: 1Gi
    globalMounts:
      - path: /config
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    suffix: data
    size: 50Gi
    globalMounts:
      - path: /data
  hls:
    type: emptyDir
    medium: Memory
    sizeLimit: 64Mi
    globalMounts:
      - path: /config/hls
