# ksops generator: decrypt the SOPS files at kustomize build time into Secrets.
#   bothy-secret       — OIDC client secret + session key (envFrom in values.yaml)
#   bothy-ghcr-pull    — dockerconfigjson for the private ghcr image
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: bothy-secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - bothy-secret.sops.yaml
  - bothy-ghcr-pull.sops.yaml
