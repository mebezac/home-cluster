# bjw-s app-template values for Bothy — homelab dashboard (mebezac/bothy-claude).
# Source of truth for the deployment shape lives in that repo's deploy/; this is
# the applied copy. Container hardening (ADR-0014/0012): nonroot UID/GID 3000,
# read-only root filesystem, drop ALL caps, RuntimeDefault seccomp. Writable
# paths are the Longhorn PVC at /data (SQLite + icon cache) and an emptyDir at
# /tmp; /config is a read-only ConfigMap.
controllers:
  bothy:
    strategy: Recreate # RWO PVC, single replica (ADR-0007)
    annotations:
      reloader.stakater.com/auto: "true" # restart on ConfigMap/Secret change (ADR-0006)
    serviceAccount:
      name: bothy # externally-defined ServiceAccount from rbac.yaml (not chart-managed)
    containers:
      app:
        image:
          repository: ghcr.io/mebezac/bothy-claude
          # Immutable digest pin of the v0.1.0 signed multi-arch release index.
          tag: v0.1.0@sha256:d6e8aeaf367e9cf51d178ac342ce4e32cd4ab2c775be1645d40db322d03ec472
        env:
          # main defaults -config to /config/config.yaml and -addr to :8080, so
          # the ConfigMap mount below (key config.yaml → /config) needs no args.
          BOTHY_ADDR: ":8080"
          TZ: America/New_York
        envFrom:
          - secretRef:
              name: bothy-secret # ksops Secret: OIDC client secret + session key (SOPS)
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /healthz, port: 8080 }
              initialDelaySeconds: 5
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              # /healthz returns 503 until the informer cache has synced
              # (ADR-0014 "readiness gates on informer sync"), so this gates
              # traffic on a warm Catalog.
              httpGet: { path: /healthz, port: 8080 }
              initialDelaySeconds: 5
              periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { memory: 256Mi }
defaultPodOptions:
  # Bothy builds an in-cluster client-go client to watch ingresses/services, so
  # it needs its ServiceAccount token mounted. app-template 5.x defaults this to
  # false (hardening), so opt back in explicitly.
  automountServiceAccountToken: true
  # Private ghcr package — pull via the ksops-generated dockerconfigjson secret.
  imagePullSecrets:
    - name: bothy-ghcr-pull
  securityContext:
    runAsUser: 3000
    runAsGroup: 3000
    fsGroup: 3000 # so the Longhorn PVC is writable by UID 3000
    seccompProfile:
      type: RuntimeDefault
service:
  app:
    controller: bothy
    ports:
      http:
        port: 8080
      # /metrics is served on the same container port (8080). ADR-0014 keeps it
      # internal by NOT routing it through the ingress (see ingress paths
      # below) — the app serves it unauthenticated for an in-cluster scrape.
ingress:
  app:
    className: internal
    hosts:
      - host: bothy.laboratory.casa
        paths:
          # Only / is exposed. /metrics is deliberately absent from the ingress
          # so it stays reachable for in-cluster Prometheus but not from outside.
          - path: /
            service:
              identifier: app
              port: http
persistence:
  data:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /data
  config:
    type: configMap
    identifier: config # binds to the chart-managed configMaps.config (resolves its real name)
    globalMounts:
      - path: /config
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
configMaps:
  config:
    # Rendered to ConfigMap "bothy-config", mounted read-only at /config. Holds
    # NO secrets (ADR-0006): the OIDC client secret + session key arrive via
    # envFrom the SOPS Secret above.
    data:
      config.yaml: |
        title: "Bothy"
        subtitle: "laboratory.casa"
        footer: "a warm light in wild terrain"
        adminGroups: ["apps_admin"]
        defaultGroups: ["apps_admin"]
        theme:
          default: system
          accent: "#e8973f"
        discovery:
          sources: [ingress, service]
          resyncInterval: 10m
        health:
          enabled: true
          interval: 30s
          timeout: 5s
        personalization:
          enabled: true
          dbPath: /data/bothy.db
        icons:
          selfhst:
            enabled: true
            cacheDir: /data/icons
        oidc:
          issuer: https://auth.laboratory.casa
          clientID: "aSOYqZrzGL1Pe2FyOofDkO8iOZRR4djp_JuqK6MaojhlZ7kAl3Uh-fpMicn3V2cIpQ1tCGtE"
          redirectURL: https://bothy.laboratory.casa/oauth2/callback
          scopes: [openid, profile, email, groups]
        session:
          ttl: 8h
        log:
          level: info
        # Static (non-k8s) demo tiles — same visibility rules apply.
        tiles:
          - name: "Longhorn"
            url: "https://longhorn.laboratory.casa"
            description: "Distributed block storage"
            section: "Infrastructure"
            groups: ["apps_admin"]
            icon: "sh:longhorn"
          - name: "Grafana"
            url: "https://graf.laboratory.casa"
            description: "Metrics & dashboards"
            section: "Infrastructure"
            groups: ["apps_admin"]
            icon: "sh:grafana"
          - name: "Argo CD"
            url: "https://argo.laboratory.casa"
            description: "GitOps continuous delivery"
            section: "Infrastructure"
            groups: ["apps_admin"]
            icon: "sh:argo-cd"
