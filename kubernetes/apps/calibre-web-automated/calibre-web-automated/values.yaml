controllers:
  calibre-web-automated:
    containers:
      app:
        image:
          repository: ghcr.io/crocodilestick/calibre-web-automated
          tag: v4.0.6@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
        env:
          CACHE_DIR: /cache
          PUID: 1000
          PGID: 1000
          TZ: America/New_York
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: &port 8083
              initialDelaySeconds: 120
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 10
          readiness: *probes
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 5m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  app:
    ports:
      http:
        port: *port

ingress:
  app:
    enabled: true
    className: internal
    hosts:
      - host: calibre.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    suffix: data
    size: 128Mi
    globalMounts:
      - path: /config
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    suffix: cache
    size: 512Mi
    globalMounts:
      - path: /cache
  media:
    enabled: true
    type: persistentVolumeClaim
    storageClass: freenas-api-nfs
    accessMode: ReadWriteMany
    size: 2Gi
    globalMounts:
      - path: /calibre-library
        subPath: library
      - path: /cwa-book-ingest
        subPath: ingest
