controllers:
  lastglance:
    containers:
      app:
        image:
          repository: ghcr.io/krelltunez/lastglance
          tag: 1.8.3@sha256:b54ac7da7f79d7c07116b8314ff4900fd71b4643a00ffb1523094d140fade6b6
        env:
          TZ: America/New_York
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

service:
  app:
    controller: lastglance
    ports:
      http:
        port: 80

ingress:
  app:
    enabled: true
    className: internal
    hosts:
      - host: last.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http
