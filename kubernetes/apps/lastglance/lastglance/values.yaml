controllers:
  lastglance:
    containers:
      app:
        image:
          repository: ghcr.io/krelltunez/lastglance
          tag: 1.8.4@sha256:56ba70ee6626010ed82e07ea6f03e62edaa66a8905cbc233a8dc068537b999cc
        env:
          TZ: America/New_York
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

service:
  app:
    controller: lastglance
    ports:
      http:
        port: 80

ingress:
  app:
    enabled: true
    className: internal
    hosts:
      - host: last.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http
