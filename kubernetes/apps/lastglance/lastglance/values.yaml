controllers:
  lastglance:
    containers:
      app:
        image:
          repository: ghcr.io/krelltunez/lastglance
          tag: 1.13.0@sha256:23f20e5241b291cd71178825e36a1d05508bbfd52c95edee6fdb9cadb5dcf7eb
        env:
          TZ: America/New_York
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

service:
  app:
    controller: lastglance
    ports:
      http:
        port: 80

ingress:
  app:
    enabled: true
    className: internal
    hosts:
      - host: last.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http
