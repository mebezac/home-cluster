controllers:
  lastglance:
    containers:
      app:
        image:
          repository: ghcr.io/krelltunez/lastglance
          tag: 1.6.0@sha256:77f1e4ecc0e4f48ff427a0052fc1c4ed614ae06677dd5f256a9757ec78ff9f95
        env:
          TZ: America/New_York
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

service:
  app:
    controller: lastglance
    ports:
      http:
        port: 80

ingress:
  app:
    enabled: true
    className: internal
    hosts:
      - host: last.laboratory.casa
        paths:
          - path: /
            service:
              identifier: app
              port: http
