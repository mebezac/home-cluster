controllers:
  backend:
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.3
          pullPolicy: IfNotPresent
        envFrom: &envFrom
          - secretRef:
              name: adventurelog-secret
    containers:
      app:
        image:
          repository: ghcr.io/seanmorley15/adventurelog-backend
          tag: v0.12.0
        env:
          TZ: America/New_York
          PUBLIC_URL: https://adventurelog-api.laboratory.casa
          FRONTEND_URL: https://adventurelog.laboratory.casa
          CSRF_TRUSTED_ORIGINS: "https://adventurelog.laboratory.casa,https://adventurelog-api.laboratory.casa"
          DEBUG: "false"
          DISABLE_REGISTRATION: "true"
        envFrom: *envFrom
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 512Mi
  frontend:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/seanmorley15/adventurelog-frontend
          tag: v0.12.0
        env:
          TZ: America/New_York
          PUBLIC_SERVER_URL: https://adventurelog-api.laboratory.casa
          ORIGIN: https://adventurelog.laboratory.casa
          BODY_SIZE_LIMIT: Infinity
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

service:
  backend:
    controller: backend
    ports:
      http:
        port: 8000
  frontend:
    controller: frontend
    ports:
      http:
        port: 3000

ingress:
  app:
    className: internal
    hosts:
      - host: adventurelog.laboratory.casa
        paths:
          - path: /
            service:
              identifier: frontend
              port: http
  api:
    className: internal
    hosts:
      - host: adventurelog-api.laboratory.casa
        paths:
          - path: /
            service:
              identifier: backend
              port: http

persistence:
  media:
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 512Mi
    advancedMounts:
      backend:
        app:
          - path: /code/media
  initdb:
    type: configMap
    name: adventurelog-initdb
    advancedMounts:
      backend:
        init-db:
          - path: /initdb
            readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
